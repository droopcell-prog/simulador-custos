<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4361ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Simulador">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Simulador de Custos">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon-512.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="style.css">
<script>if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(r=>r.unregister()));caches.keys().then(k=>Promise.all(k.map(k=>caches.delete(k))))}</script>
<title>Simulador de Custos v2</title>
</head>
<body>

<div class="header">
  <h1>📊 Simulador de Custos v2.0</h1>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportData()">📤 Exportar</button>
    <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📥 Importar</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-outline" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div id="installBanner" onclick="installApp()">📲 Instalar aplicativo &mdash; usar sem internet <strong>Instalar</strong></div>

<nav class="bottom-nav">
  <a href="#" class="active" data-module="dashboard" onclick="switchModule('dashboard')"><span>📊</span>Dashboard</a>
  <a href="#" data-module="produtos" onclick="switchModule('produtos')"><span>📦</span>Produtos</a>
  <a href="#" data-module="veiculos" onclick="switchModule('veiculos')"><span>🚗</span>Veículos</a>
  <a href="#" data-module="eventos" onclick="switchModule('eventos')"><span>🎪</span>Eventos</a>
</nav>

<div class="layout">
  <nav class="sidebar">
    <a href="#" class="active" data-module="dashboard" onclick="switchModule('dashboard')">📊 Dashboard</a>
    <a href="#" data-module="produtos" onclick="switchModule('produtos')">📦 Produtos</a>
    <a href="#" data-module="veiculos" onclick="switchModule('veiculos')">🚗 Veículos</a>
    <a href="#" data-module="eventos" onclick="switchModule('eventos')">🎪 Eventos</a>
  </nav>
  <div class="main" id="app"></div>
</div>

<script src="script.js?v=3"></script>
</body>
</html>
